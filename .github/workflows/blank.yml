name: Stable-AI-Workstation-Fixed
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' 

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_BACKUP_TOKEN }} 

      - name: System Power & RAM Boost
        run: |
          # Virtual RAM setting with force
          wmic computersystem where name="%computername%" set AutomaticManagedPagefile=False
          wmic pagefileset create name="C:\\pagefile.sys",InitialSize=16384,MaximumSize=32768
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
        continue-on-error: true # Agar ye step error de to agle pe jaye

      - name: Install Tailscale (Silent Mode)
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile "ts.msi" -TimeoutSec 60
          # /qn switch lagaya hai taake koi popup na aaye
          Start-Process msiexec.exe -ArgumentList "/i", "ts.msi", "/qn", "/norestart" -Wait
        
      - name: Install Ollama (Fast & Silent)
        run: |
          $olUrl = "https://ollama.com/download/OllamaSetup.exe"
          Invoke-WebRequest -Uri $olUrl -OutFile "ollama_setup.exe" -TimeoutSec 60
          # /silent switch lazmi hai warna setup ruk jata hai
          Start-Process -FilePath "ollama_setup.exe" -ArgumentList "/silent" -Wait

      - name: Configure Network & User
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          $pass = "DevMode@2026#"
          $secPass = ConvertTo-SecureString $pass -AsPlainText -Force
          # Check agar user pehle se hai to delete karke naya banaye
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) { Remove-LocalUser -Name "RDP" }
          New-LocalUser -Name "RDP" -Password $secPass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"

      - name: Launch Services
        run: |
          # Tailscale ko auth key ke sath uthana
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=ai-server-epyc --accept-routes
          
          [Environment]::SetEnvironmentVariable("OLLAMA_HOST", "0.0.0.0", "Machine")
          
          $ollamaPath = "$env:LocalAppData\Programs\Ollama\ollama.exe"
          # Start-Process ko setup ke baad check karna
          if (Test-Path $ollamaPath) {
             Start-Process -FilePath $ollamaPath -ArgumentList "serve" -WindowStyle Hidden
             Start-Sleep -Seconds 30
             & $ollamaPath pull qwen2.5-coder:7b
          } else {
             Write-Host "Ollama not found, skipping pull"
          }

      - name: Keep Alive
        run: |
          Write-Host "RDP and AI Server are now running..."
          $timeout = New-TimeSpan -Minutes 350
          $sw = [diagnostics.stopwatch]::StartNew()
          while ($sw.Elapsed -lt $timeout) {
              Write-Host "[$(Get-Date)] Heartbeat - Still Running..."
              Start-Sleep -Seconds 300
          }
