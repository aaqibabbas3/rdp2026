name: AI-Workstation-Backup-Crypto
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' 

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_BACKUP_TOKEN }} # Backup ke liye naya token chahiye

      - name: Cache Models
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Programs\Ollama\models
          key: ${{ runner.os }}-ollama-qwen-7b

      - name: System Boost & User Setup
        run: |
          wmic computersystem where name="%computername%" set AutomaticManagedPagefile=False
          wmic pagefileset create name="C:\\pagefile.sys",InitialSize=16384,MaximumSize=32768
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          $pass = "DevMode@2026#"
          $secPass = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $secPass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"

      - name: Install AI & Tailscale
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "ts.msi", "/quiet", "/norestart" -Wait
          Invoke-WebRequest -Uri "https://ollama.com/download/OllamaSetup.exe" -OutFile "ollama.exe"
          Start-Process -FilePath "ollama.exe" -ArgumentList "/silent" -Wait

      - name: Start Services & Pull Model
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=ai-server-epyc
          [Environment]::SetEnvironmentVariable("OLLAMA_HOST", "0.0.0.0", "Machine")
          Start-Process -FilePath "$env:LocalAppData\Programs\Ollama\ollama.exe" -ArgumentList "serve" -WindowStyle Hidden
          Start-Sleep -Seconds 20
          & "$env:LocalAppData\Programs\Ollama\ollama.exe" pull qwen2.5-coder:7b

      - name: Background Auto-Backup & Crypto Watch
        shell: pwsh
        run: |
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "RDP READY AT: $tsIP"
          
          # Background Loop for Backup & Crypto
          $script = {
              while ($true) {
                  # 1. Crypto Monitoring (Example: BNB Price)
                  try {
                      $crypto = Invoke-RestMethod -Uri "https://api.binance.com/api/v3/ticker/price?symbol=BNBUSDT"
                      $msg = "[$(Get-Date)] BNB Price: $($crypto.price)"
                      $msg | Out-File -FilePath "C:\crypto_log.txt" -Append
                  } catch { }

                  # 2. Auto-Git Backup
                  if (Test-Path ".git") {
                      git add .
                      git commit -m "Auto-backup: $(Get-Date)"
                      git push origin main
                  }
                  
                  Start-Sleep -Seconds 900 # 15 minutes ka gap
              }
          }
          Start-Job -ScriptBlock $script

      - name: Keep Alive
        run: |
          $timeout = New-TimeSpan -Minutes 350
          $sw = [diagnostics.stopwatch]::StartNew()
          while ($sw.Elapsed -lt $timeout) {
              $cpu = (Get-Counter '\Processor(_Total)\% Processor Time').CounterSamples.CookedValue
              Write-Host "[$(Get-Date)] Server Active | CPU: $([math]::Round($cpu, 1))%"
              Start-Sleep -Seconds 300
          }
